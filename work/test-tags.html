<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>标签选中测试</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
h3 { margin-bottom: 8px; font-size: 14px; }
.row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; padding: 8px; background: #fff; border-radius: 8px; }
.tag { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: 30px; font-size: 14px; cursor: pointer; transition: all .2s; user-select: none; border: 2px solid #E0D5D5; background: #fff; }
.tag.sel { border-color: #FF8FA3; background: #FF8FA3; color: #fff; box-shadow: 0 4px 14px rgba(255,143,163,0.35); }
.sm { padding: 4px 10px; border-radius: 12px; font-size: 13px; }
.info { margin-top: 12px; padding: 8px; background: #eee; border-radius: 6px; font-size: 12px; }
</style></head><body>

<h3>分类 (单选)</h3>
<div class="row" id="catRow"></div>

<h3>心情 (单选)</h3>
<div class="row" id="moodRow"></div>

<h3>天气 (单选)</h3>
<div class="row" id="weatherRow"></div>

<div class="info" id="info"></div>

<script>
var data = {
  categoryId: 'daily',
  mood: '',
  weather: '',
  categories: [
    {id:'daily',name:'日常',emoji:'☀️',color:'#FFB3BA'},
    {id:'food',name:'美食',emoji:'🍪',color:'#FFDFBA'},
    {id:'travel',name:'出行',emoji:'🚞',color:'#BAFFC9'},
    {id:'work',name:'工作',emoji:'💈',color:'#BAE1FF'},
  ],
  moodOptions: [
    {value:'开心',emoji:'😉'},{value:'平常',emoji:'😓'},
    {value:'难过',emoji:'😩'},{value:'生气',emoji:'😧'},
  ],
  weatherOptions: [
    {value:'晴',emoji:'☀️'},{value:'多云',emoji:'⛅'},
    {value:'雨',emoji:'🌧️'},{value:'雪',emoji:'❄️'},
  ]
};

function render() {
  catRow.innerHTML = data.categories.map(function(c) {
    var sel = data.categoryId === c.id ? ' sel' : '';
    return '<span class="tag' + sel + '" onclick="selectCat(\'' + c.id + '\')">' + c.emoji + ' ' + c.name + '</span>';
  }).join('');
  moodRow.innerHTML = data.moodOptions.map(function(m) {
    var sel = data.mood === m.value ? ' sel' : '';
    return '<span class="tag sm' + sel + '" onclick="selectMood(\'' + m.value + '\')">' + m.emoji + ' ' + m.value + '</span>';
  }).join('');
  weatherRow.innerHTML = data.weatherOptions.map(function(w) {
    var sel = data.weather === w.value ? ' sel' : '';
    return '<span class="tag sm' + sel + '" onclick="selectWeather(\'' + w.value + '\')">' + w.emoji + ' ' + w.value + '</span>';
  }).join('');
  info.textContent = '当前选中: 分类=' + data.categoryId + ' 心情=' + (data.mood||'无') + ' 天气=' + (data.weather||'无');
}

function selectCat(id) { data.categoryId = id; render(); }
function selectMood(v) { data.mood = data.mood === v ? '' : v; render(); }
function selectWeather(v) { data.weather = data.weather === v ? '' : v; render(); }

render();
</script></body></html>
